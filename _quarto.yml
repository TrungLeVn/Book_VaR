project:
  type: book

book:
  title: "Đo lường biến động tỷ suất sinh lời và giá trị chịu rủi ro"
  author: "Trung H. Le"
  date: "3/19/2026"
  chapters:
    - index.qmd
    - chapters/ch01.qmd
    - chapters/ch02.qmd
    - references.qmd

bibliography: references.bib

format:
  pdf:
    documentclass: scrreprt
    pdf-engine: xelatex
    latex-auto-mk: true
    latex-auto-install: true
    toc: true
    number-sections: true
    mainfont: "Times New Roman"
    sansfont: "Arial"
    monofont: "Courier New"
    linestretch: 1.3
    include-in-header:
      text: |
        \usepackage{float}

editor: visual

execute:
  echo: false
  warning: false
  message: false
  freeze: auto

crossref:
  fig-title: "Hình"
  tbl-title: "Bảng"
  lst-title: "Mã"
  sec-prefix: "Mục"